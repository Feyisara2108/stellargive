# cargo-audit configuration.
# These advisories are transitive dependencies pulled in by soroban-sdk and
# have no upstream fix available; they are not exploitable in this contract's
# context. Re-evaluate when soroban-sdk updates its dependency tree.
[advisories]
ignore = [
    "RUSTSEC-2025-0056", # `adler` unmaintained (transitive; superseded by adler2 upstream)
    "RUSTSEC-2024-0436", # `paste` unmaintained (proc-macro, transitive; no replacement wired by soroban-sdk yet)
    "RUSTSEC-2026-0097", # `rand` unsound only with a custom logger via rand::rng(); not used here
]
