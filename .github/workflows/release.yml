name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Log Release Creation
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "Release was successfully created!"
          echo "Tag: ${{ steps.release.outputs.tag_name }}"
          echo "Version: ${{ steps.release.outputs.version }}"

  sbom:
    name: Generate SBOM
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend SBOM (npm / CycloneDX) ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate frontend SBOM
        working-directory: frontend
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom-frontend.cdx.json
          echo "Frontend SBOM generated."

      # ── Contract SBOM + optimized WASM (cargo / CycloneDX) ───────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate contract SBOM
        working-directory: contracts/stellar-give
        run: |
          cargo cyclonedx --format json --output-cdx
          mv bom.json ../../sbom-contracts.cdx.json
          echo "Contract SBOM generated."

      - name: Install Soroban CLI system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Build optimized contract WASM
        run: bash scripts/build-contract.sh

      - name: Copy optimized WASM for release
        run: cp contracts/stellar-give/target/wasm32-unknown-unknown/release/stellar_give.optimized.wasm ./stellar_give.optimized.wasm

      # ── Sign SBOMs (Sigstore/cosign, keyless) ─────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOMs
        run: |
          cosign sign-blob --yes \
            --output-signature sbom-frontend.cdx.json.sig \
            --output-certificate sbom-frontend.cdx.json.pem \
            sbom-frontend.cdx.json
          cosign sign-blob --yes \
            --output-signature sbom-contracts.cdx.json.sig \
            --output-certificate sbom-contracts.cdx.json.pem \
            sbom-contracts.cdx.json

      # ── Build provenance attestation for released artifacts ───────────────
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            sbom-frontend.cdx.json
            sbom-contracts.cdx.json
            stellar_give.optimized.wasm

      # ── Attach everything to the GitHub Release ───────────────────────────
      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            sbom-frontend.cdx.json \
            sbom-frontend.cdx.json.sig \
            sbom-frontend.cdx.json.pem \
            sbom-contracts.cdx.json \
            sbom-contracts.cdx.json.sig \
            sbom-contracts.cdx.json.pem \
            stellar_give.optimized.wasm \
            --clobber
