name: ci-frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node: [20]

    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable Corepack (pnpm/yarn support)
        run: corepack enable

      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "name=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "name=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "name=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache node_modules and Next.js cache
        # Caching .next/cache significantly reduces build times in large apps.
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            frontend/.next/cache
          key: ${{ runner.os }}-node-${{ matrix.node }}-${{ steps.pm.outputs.name }}-${{ hashFiles('frontend/package-lock.json', 'frontend/pnpm-lock.yaml', 'frontend/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-${{ steps.pm.outputs.name }}-

      - name: Install dependencies
        run: |
          case "${{ steps.pm.outputs.name }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            npm) npm ci ;;
          esac

      - name: Lint
        run: |
          case "${{ steps.pm.outputs.name }}" in
            pnpm) pnpm run lint ;;
            yarn) yarn lint ;;
            npm) npm run lint ;;
          esac

      - name: Build
        run: |
          case "${{ steps.pm.outputs.name }}" in
            pnpm) pnpm run build ;;
            yarn) yarn build ;;
            npm) npm run build ;;
          esac
